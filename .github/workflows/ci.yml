name: CI

on:
  push:
  pull_request:

jobs:
  test-and-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: flake8 .

      - name: Format check
        run: black --check .

      - name: Type check
        run: mypy app main.py

      - name: Tests
        run: pytest

      - name: Build container
        run: docker build -t advance-db-systems .
