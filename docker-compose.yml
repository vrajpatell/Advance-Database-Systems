version: '3.9'
services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
  dashboard:
    image: python:3.11-slim
    working_dir: /app
    command: sh -c "pip install --no-cache-dir -r dashboard/requirements.txt && streamlit run dashboard/dashboard.py --server.port 8501 --server.address 0.0.0.0"
    volumes:
      - .:/app
    ports:
      - "8501:8501"
    depends_on:
      - api
